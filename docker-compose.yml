version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:password@host.docker.internal:5432/finance_db
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://api:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - api
